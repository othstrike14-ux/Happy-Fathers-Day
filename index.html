<!DOCTYPE html>
<html>
<head>
    <title>Happy Father's Day</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #4b6cb7, #182848);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 1.5s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
        }

        .slideshow {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 400px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(0,0,0,0.15);
        }
        
        .slide {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            opacity: 0;
            transition: opacity 1s ease;
            object-fit: contain;
        }
        
        .slide.active {
            opacity: 1;
        }

        .memory {
            margin: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
        }

        #content {
            display: none;
        }
    </style>
</head>

<body>

<div id="content">
    <div class="container">
        <h1>Happy Father's Day Dad ❤️</h1>

        <p>
            Thank you for everything you've done for me.
            This little website is just a reminder of how much you mean to me.
        </p>

        <div class="slideshow">
            <img src="dad.jpg" class="slide active">
            <img src="dad2.jpg" class="slide">
            <img src="dad3.jpg" class="slide">
        </div>

        <h2>A Message For You</h2>

        <div class="memory">
            <p>
                Happy Fathers Day! Thank you for everything that you've done for me, I hope you enjoy this website made to celebrate you.
            </p>
        </div>

        <h2>Love, Othniel</h2>
    </div>
</div>

<script>
        const code = prompt("Enter the secret code:");
        
        if (code === "BOSAA") {
            document.getElementById("content").style.display = "block";
        } else {
            document.body.innerHTML =
                "<h1 style='text-align:center;margin-top:100px;color:white;'>Access Denied</h1>";
        }
        
        // slideshow logic
        let current = 0;
        const slides = document.querySelectorAll(".slide");
        
        function showSlide(index) {
            slides.forEach(s => s.classList.remove("active"));
            slides[index].classList.add("active");
        }
        
        setInterval(() => {
            current = (current + 1) % slides.length;
            showSlide(current);
        }, 4000);
        
        // swipe support
        let startX = 0;
        
        const slideshow = document.querySelector(".slideshow");
        
        slideshow.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });
        
        slideshow.addEventListener("touchend", (e) => {
            let endX = e.changedTouches[0].clientX;
        
            if (startX - endX > 50) {
                // swipe left → next
                current = (current + 1) % slides.length;
                showSlide(current);
            }
        
            if (endX - startX > 50) {
                // swipe right → previous
                current = (current - 1 + slides.length) % slides.length;
                showSlide(current);
            }
        });
</script>

</body>
</html>
