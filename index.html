<!DOCTYPE html>
<html>
<head>
    <title>Happy Father's Day Dad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            text-align: center;
            padding: 40px;
        }

        .card {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin: 20px 0;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            font-size: 18px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Happy Father's Day Dad!</h1>

        <img src="dad.jpg" alt="Dad">

        <p>
            Thank you for everything you've done for me.
            I appreciate your support, guidance, and all the memories we've made together.
        </p>

        <h2>Some of My Favorite Memories</h2>

        <p>• Memory #1</p>
        <p>• Memory #2</p>
        <p>• Memory #3</p>

        <h3>Love, [Your Name]</h3>
    </div>
</body>
</html>
